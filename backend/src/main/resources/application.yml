spring:
  application:
    name: ez-one-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ez_one}
    username: ${DB_USERNAME:ez_one}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/**/*.xml

server:
  port: ${SERVER_PORT:8080}

auth:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    token-uri: ${GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
    user-info-uri: ${GOOGLE_USER_INFO_URI:https://www.googleapis.com/oauth2/v3/userinfo}
  jwt:
    access-secret: ${JWT_ACCESS_SECRET}
    refresh-secret: ${JWT_REFRESH_SECRET}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:30}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:14}
