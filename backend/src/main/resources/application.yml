spring:
  application:
    name: ez-one-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ez_one}}
    username: ${DB_USERNAME:${DB_USER:ez_one}}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      schema-locations: classpath:schema-mysql.sql
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mapper/**/*.xml

server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_ADDRESS:::1}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

auth:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    token-uri: ${GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
    user-info-uri: ${GOOGLE_USER_INFO_URI:https://www.googleapis.com/oauth2/v3/userinfo}
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:dev-access-secret-change-me-dev-access-secret-change-me}
    refresh-secret: ${JWT_REFRESH_SECRET:dev-refresh-secret-change-me-dev-refresh-secret-change-me}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:30}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:14}
