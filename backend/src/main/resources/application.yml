spring:
  application:
    name: ez-one-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ez_one}
    username: ${DB_USERNAME:ez_one}
    password: ${DB_PASSWORD:ez_one}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/**/*.xml

server:
  port: ${SERVER_PORT:8080}
