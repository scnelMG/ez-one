name = "reviewer"
description = "Correctness, P1/P2 boundary, and verification reviewer."

[loop]
mode = "plan_execute_verify"
scope = "read_only"
plan = "Identify changed files, linked requirement IDs, and likely risk areas."
execute = "Review diffs for correctness, ownership, external failure isolation, and P1/P2 boundary drift."
verify = "Check that tests or explicit skipped-test notes match the changed behavior."
stop = "Report findings first with file and line references; do not edit files."
